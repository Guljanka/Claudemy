name: Deploy to ECS

on:
  push:
    branches: [ main ]

env:
  ECS_CLUSTER: student-cluster
  ECS_SERVICE: student-task-service
  IMAGE_TAG: v4

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          docker build --platform linux/amd64 -t student-website:latest .
          docker tag student-website:latest 851771533724.dkr.ecr.us-east-1.amazonaws.com/student-website:latest
          docker push 851771533724.dkr.ecr.us-east-1.amazonaws.com/student-website:latest

      - name: Force ECS deployment
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment
